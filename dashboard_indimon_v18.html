const callClaude=async(prompt,jsonMode=false)=>{
  const sysMsg=jsonMode?CLAUDE_SYSTEM+" Responde ÚNICAMENTE con JSON válido, sin texto adicional ni bloques markdown.":CLAUDE_SYSTEM;
  let delay=1000;
  for(let i=0;i<5;i++){
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sysMsg,messages:[{role:"user",content:prompt}]})
      });
      if(!r.ok)throw new Error(r.status);
      const d=await r.json();
      const txt=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      return jsonMode?txt.replace(/```json|```/g,"").trim():txt;
    }catch(e){if(i===4)throw e;await new Promise(res=>setTimeout(res,delay));delay*=2;}
  }
};
