                                  {cell&&cell.tasks.length>0&&<span className={`text-[8px] mt-0.5 font-bold ${darkMode?'text-slate-400':'text-slate-500'}`}>{cell.tasks.length} tarea{cell.tasks.length!==1?'s':''}</span>}
                                </div>
                              );
                            })}
                          </div>
                        ))}
                      </div>
                      <p className={`text-[9px] mt-2 ${darkMode?'text-slate-600':'text-slate-400'}`}>Eje X = Probabilidad · Eje Y = Impacto</p>
                    </div>
                  </div>

                  {/* Top riesgos */}
                  <div className={`p-5 rounded-2xl border ${darkMode?'bg-slate-900 border-slate-800':'bg-white border-slate-200'}`}>
                    <h3 className={`text-xs font-bold uppercase tracking-widest mb-4 ${darkMode?'text-slate-400':'text-slate-500'}`}><i className="fa-solid fa-list-check mr-1 text-amber-400"/>Tareas por Nivel de Riesgo</h3>
                    <div className="space-y-2 max-h-60 overflow-y-auto pr-1">
                      {withRisk.filter(t=>t.status!=='Done').slice(0,12).map(t=>(
                        <div key={t.id} className={`flex items-center gap-3 p-2.5 rounded-xl ${darkMode?'bg-slate-800':'bg-slate-50'}`}>
                          <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 font-black text-white text-sm" style={{background:riskColor(t.rScore)}}>{t.rScore}</div>
                          <div className="flex-1 min-w-0">
                            <p className={`text-xs font-semibold truncate ${darkMode?'text-slate-200':'text-slate-700'}`}>{t.title}</p>
                            <p className={`text-[10px] ${darkMode?'text-slate-500':'text-slate-400'}`}>{t.block} · {t.norma||'General'} · {t.assignee}</p>
                          </div>
                          <div className="text-right shrink-0">
                            <p className="text-[10px] font-bold" style={{color:riskColor(t.rScore)}}>{riskLabel(t.rScore)}</p>
                            <p className={`text-[9px] ${darkMode?'text-slate-600':'text-slate-400'}`}>{t.riesgoProbabilidad||'Baja'}×{t.riesgoImpacto||'Leve'}</p>
                          </div>
                        </div>
                      ))}
                      {withRisk.filter(t=>t.status!=='Done').length===0&&<p className={`text-xs italic py-6 text-center ${darkMode?'text-slate-600':'text-slate-400'}`}>No hay tareas activas. ¡Todo completado!</p>}
                    </div>
                  </div>
                </div>

                {/* Editor de riesgo por tarea */}
                <div className={`p-5 rounded-2xl border ${darkMode?'bg-slate-900 border-slate-800':'bg-white border-slate-200'}`}>
                  <h3 className={`text-xs font-bold uppercase tracking-widest mb-4 ${darkMode?'text-slate-400':'text-slate-500'}`}><i className="fa-solid fa-sliders mr-1 text-blue-400"/>Asignar Riesgo por Tarea</h3>
                  <div className="overflow-x-auto">
                    <table className={`w-full text-xs ${darkMode?'text-slate-300':'text-slate-700'}`}>
                      <thead><tr className={`text-[10px] uppercase tracking-wide ${darkMode?'text-slate-500':'text-slate-400'}`}>
                        <th className="text-left pb-2 pr-3">Tarea</th>
                        <th className="text-left pb-2 pr-3">Norma</th>
                        <th className="text-left pb-2 pr-3">Probabilidad</th>
                        <th className="text-left pb-2 pr-3">Impacto</th>
                        <th className="text-left pb-2">Score</th>
                      </tr></thead>
                      <tbody className={`divide-y ${darkMode?'divide-slate-800':'divide-slate-100'}`}>
                        {tasks.filter(t=>t.status!=='Done').map(t=>(
                          <tr key={t.id}>
                            <td className="py-1.5 pr-3 font-semibold truncate max-w-[160px]">{t.title}</td>
                            <td className="py-1.5 pr-3"><span className="px-1.5 py-0.5 rounded text-[10px] font-bold bg-indigo-900/40 text-indigo-300">{t.norma||'General'}</span></td>
                            <td className="py-1.5 pr-3">
                              <select value={t.riesgoProbabilidad||'Baja'} onChange={e=>dbUpdate(t.id,{riesgoProbabilidad:e.target.value})}
                                className={`text-[11px] border rounded-lg px-1.5 py-0.5 outline-none cursor-pointer ${darkMode?'bg-slate-800 border-slate-700':'bg-white border-slate-200'}`}>
                                {RIESGO_PROB.map(p=><option key={p}>{p}</option>)}
                              </select>
                            </td>
                            <td className="py-1.5 pr-3">
                              <select value={t.riesgoImpacto||'Leve'} onChange={e=>dbUpdate(t.id,{riesgoImpacto:e.target.value})}
                                className={`text-[11px] border rounded-lg px-1.5 py-0.5 outline-none cursor-pointer ${darkMode?'bg-slate-800 border-slate-700':'bg-white border-slate-200'}`}>
                                {RIESGO_IMP.map(p=><option key={p}>{p}</option>)}
                              </select>
                            </td>
                            <td className="py-1.5">
                              <span className="px-2 py-0.5 rounded-full text-[11px] font-black text-white" style={{background:riskColor(riskScore(t))}}>{riskScore(t)}</span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ══ HISTORIAL ══ */}
          {activeTab==='activity'&&(
            <div className={`rounded-2xl border overflow-hidden ${darkMode?'bg-slate-900 border-slate-800':'bg-white border-slate-200'}`}>
              <div className={`px-6 py-4 border-b flex items-center justify-between ${darkMode?'bg-slate-800/60 border-slate-700':'bg-slate-50 border-slate-100'}`}>
                <h3 className="font-bold flex items-center gap-2 text-sm"><i className="fa-solid fa-clock-rotate-left text-blue-500"/> Historial de Actividad</h3>
                <div className="flex items-center gap-3">
                  <span className={`text-xs font-mono ${darkMode?'text-slate-500':'text-slate-400'}`}>{notifications.length} eventos</span>
                  {notifications.length>0&&(
                    <button onClick={()=>notifsCol().get().then(s=>s.docs.forEach(d=>d.ref.delete()))}
                      className="text-xs text-red-400 hover:text-red-300 font-bold transition-colors no-print">
                      <i className="fa-solid fa-trash-can mr-1"/>Limpiar todo
                    </button>
                  )}
                </div>
              </div>
              {notifications.length===0
                ?<div className="flex flex-col items-center justify-center py-20 opacity-30">
                    <i className="fa-solid fa-clock-rotate-left text-5xl mb-4"/>
                    <p className="font-bold">Sin actividad registrada</p>
                    <p className="text-sm mt-1">Las acciones del equipo aparecerán aquí</p>
                  </div>
                :<div className="divide-y divide-slate-800">
                    {notifications.map((n,i)=>{
                      const col=notifColorMap[n.color]||notifColorMap.blue;
                      return(
                        <div key={n.id||i} className={`flex gap-4 px-6 py-4 transition-colors ${darkMode?'hover:bg-slate-800/40':'hover:bg-slate-50'}`}>
                          <div className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${col}`}>
                            <i className={`fa-solid ${n.icon||'fa-circle-dot'} text-sm`}/>
                          </div>
                          <div className="flex-1">
                            <div className="flex items-center justify-between mb-0.5">
                              <p className={`font-bold text-sm ${darkMode?'text-slate-200':'text-slate-800'}`}>{n.title}</p>
                              <p className={`text-[11px] font-mono shrink-0 ml-4 ${darkMode?'text-slate-600':'text-slate-400'}`}>{fmtDate(n.ts)}</p>
                            </div>
                            <p className={`text-xs ${darkMode?'text-slate-400':'text-slate-600'}`}>{n.body}</p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
              }
            </div>
          )}

        </div>
      </main>

      {/* ══ MODAL Nueva Tarea ══ */}
      {showAddModal&&(
        <div className="fixed inset-0 bg-black/60 z-50 overflow-y-auto" onClick={e=>{if(e.target===e.currentTarget)setShowAddModal(false);}}>
          <div className="flex min-h-full items-end sm:items-center justify-center p-0 sm:p-4">
          <div className={`rounded-t-2xl sm:rounded-2xl p-5 sm:p-6 pb-8 sm:pb-6 w-full sm:max-w-md shadow-2xl border ${darkMode?'bg-slate-900 border-slate-700':'bg-white border-slate-200'}`} onClick={e=>e.stopPropagation()}>
            <h3 className="text-base font-bold mb-5 flex items-center gap-2"><i className="fa-solid fa-plus text-blue-500"/> Nueva Tarea</h3>
            <div className="space-y-4">
              <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Título *</label>
                <input type="text" value={newTask.title} onChange={e=>setNewTask({...newTask,title:e.target.value})} autoFocus
                  className={`w-full border rounded-xl p-3 text-base sm:text-sm outline-none focus:ring-2 focus:ring-blue-500/50 ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`} placeholder="Ej. Revisión de soldadura..." autoFocus/>
              </div>
              <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Bloque de trabajo</label>
                <input type="text" value={newTask.block} onChange={e=>setNewTask({...newTask,block:e.target.value})}
                  className={`w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500/50 ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}/>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Responsable</label>
                  <select value={newTask.assignee} onChange={e=>setNewTask({...newTask,assignee:e.target.value})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}>
                    <option>Inspector</option><option>Aprendiz</option><option>Ambos</option>
                  </select>
                </div>
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Norma</label>
                  <select value={newTask.norma||'General'} onChange={e=>setNewTask({...newTask,norma:e.target.value})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}>
                    {NORMAS.map(n=><option key={n}>{n}</option>)}
                  </select>
                </div>
              <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Prioridad</label>
                  <select value={newTask.priority} onChange={e=>setNewTask({...newTask,priority:e.target.value})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}>
                    <option>Baja</option><option>Media</option><option>Alta</option>
                  </select>
                </div>
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Semana inicio</label>
                  <input type="number" min="1" max="10" value={newTask.start} onChange={e=>setNewTask({...newTask,start:Number(e.target.value)})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}/>
                </div>
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Semana fin</label>
                  <input type="number" min="1" max="10" value={newTask.end} onChange={e=>setNewTask({...newTask,end:Number(e.target.value)})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}/>
                </div>
              </div>
            </div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Aprobador</label>
                  <input type="text" value={newTask.aprobador||''} onChange={e=>setNewTask({...newTask,aprobador:e.target.value})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`} placeholder="Ej. Gerencia"/>
                </div>
                <div className="flex flex-col justify-center"><label className="text-[11px] font-bold text-slate-500 block mb-2">Entregable Final</label>
                  <label className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={!!newTask.entregable} onChange={e=>setNewTask({...newTask,entregable:e.target.checked})} className="accent-blue-500 w-4 h-4"/>
                    <span className="text-xs font-semibold text-slate-400">Sí, es entregable</span>
                  </label>
                </div>
              </div>
            <div className="flex justify-end gap-2 mt-6">
              <button onClick={()=>setShowAddModal(false)} className={`px-4 py-2 text-sm font-bold rounded-xl ${darkMode?'hover:bg-slate-800 text-slate-400':'hover:bg-slate-100 text-slate-500'}`}>Cancelar</button>
              <button onClick={handleCreateTask} disabled={!newTask.title.trim()} className="px-5 py-2 text-sm font-bold bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-all disabled:opacity-50">Guardar Tarea</button>
            </div>
          </div>
          </div>
        </div>
      )}

      {/* ══ MODAL Editar Tarea ══ */}
      {editTask&&(
        <div className="fixed inset-0 bg-black/60 z-50 overflow-y-auto" onClick={e=>{if(e.target===e.currentTarget)setEditTask(null);}}>
          <div className="flex min-h-full items-end sm:items-center justify-center p-0 sm:p-4">
          <div className={`rounded-t-2xl sm:rounded-2xl p-5 sm:p-6 pb-8 sm:pb-6 w-full sm:max-w-md shadow-2xl border ${darkMode?'bg-slate-900 border-slate-700':'bg-white border-slate-200'}`} onClick={e=>e.stopPropagation()}>
            <h3 className="text-base font-bold mb-5 flex items-center gap-2"><i className="fa-solid fa-pen text-indigo-400"/> Editar Tarea</h3>
            <div className="space-y-4">
              <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Título</label>
                <input type="text" value={editTask.title} onChange={e=>setEditTask({...editTask,title:e.target.value})} autoFocus
                  className={`w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500/50 ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}/>
              </div>
              <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Bloque</label>
                <input type="text" value={editTask.block} onChange={e=>setEditTask({...editTask,block:e.target.value})}
                  className={`w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500/50 ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}/>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Responsable</label>
                  <select value={editTask.assignee} onChange={e=>setEditTask({...editTask,assignee:e.target.value})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}>
                    <option>Inspector</option><option>Aprendiz</option><option>Ambos</option>
                  </select>
                </div>
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Prioridad</label>
                  <select value={editTask.priority} onChange={e=>setEditTask({...editTask,priority:e.target.value})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}>
                    <option>Baja</option><option>Media</option><option>Alta</option>
                  </select>
                </div>
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Semana inicio</label>
                  <input type="number" min="1" max="10" value={editTask.start} onChange={e=>setEditTask({...editTask,start:Number(e.target.value)})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}/>
                </div>
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Semana fin</label>
                  <input type="number" min="1" max="10" value={editTask.end} onChange={e=>setEditTask({...editTask,end:Number(e.target.value)})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}/>
                </div>
              </div>
            </div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Norma</label>
                  <select value={editTask.norma||'General'} onChange={e=>setEditTask({...editTask,norma:e.target.value})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}>
                    {NORMAS.map(n=><option key={n}>{n}</option>)}
                  </select>
                </div>
                <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Aprobador</label>
                  <input type="text" value={editTask.aprobador||''} onChange={e=>setEditTask({...editTask,aprobador:e.target.value})}
                    className={`w-full border rounded-xl p-2.5 text-sm outline-none ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`} placeholder="Ej. Gerencia"/>
                </div>
              </div>
              <div className="flex items-center gap-2 mt-1">
                <input type="checkbox" checked={!!editTask.entregable} onChange={e=>setEditTask({...editTask,entregable:e.target.checked})} className="accent-indigo-500 w-4 h-4"/>
                <label className="text-xs font-semibold text-slate-400 cursor-pointer">Entregable Final (requiere aprobación)</label>
              </div>
            <div className="flex justify-end gap-2 mt-6">
              <button onClick={()=>setEditTask(null)} className={`px-4 py-2 text-sm font-bold rounded-xl ${darkMode?'hover:bg-slate-800 text-slate-400':'hover:bg-slate-100 text-slate-500'}`}>Cancelar</button>
              <button onClick={handleSaveEdit} className="px-5 py-2 text-sm font-bold bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-all">Guardar Cambios</button>
            </div>
          </div>
          </div>
        </div>
      )}

      {/* ══ MODAL Bloqueo ══ */}
      {blockingId&&(
        <div className="fixed inset-0 bg-black/60 z-50 overflow-y-auto" onClick={e=>{if(e.target===e.currentTarget)setBlockingId(null);}}>
          <div className="flex min-h-full items-end sm:items-center justify-center p-0 sm:p-4">
          <div className={`rounded-t-2xl sm:rounded-2xl p-5 sm:p-6 pb-8 sm:pb-6 w-full sm:max-w-md shadow-2xl border ${darkMode?'bg-slate-900 border-slate-700':'bg-white border-slate-200'}`} onClick={e=>e.stopPropagation()}>
            <h3 className="text-base font-bold mb-4 text-red-400 flex items-center gap-2"><i className="fa-solid fa-lock"/> Motivo del Bloqueo</h3>
            <textarea rows="3" value={blockReason} onChange={e=>setBlockReason(e.target.value)} autoFocus
              className={`w-full border rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-red-500/40 ${darkMode?'bg-slate-800 border-slate-700':'bg-slate-50 border-slate-300'}`}
              placeholder="Ej. Almacén no ha entregado materiales..."/>
            <div className="flex justify-end gap-2 mt-4">
              <button onClick={()=>setBlockingId(null)} className={`px-4 py-2 text-sm font-bold rounded-xl ${darkMode?'hover:bg-slate-800 text-slate-400':'hover:bg-slate-100 text-slate-500'}`}>Cancelar</button>
              <button onClick={()=>{moveTask(blockingId,'Blocked',blockReason);setBlockingId(null);}}
                className="px-5 py-2 text-sm font-bold bg-red-600 text-white rounded-xl hover:bg-red-700 transition-all">Bloquear</button>
            </div>
          </div>
          </div>
        </div>
      )}

    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

  </script>

</body>
</html>
